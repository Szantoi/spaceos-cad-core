# EPICS.yaml — a lokál (Cabinet) flotta projekt/epic/sarokkő definíciói.
#
# MIÉRT (goal-externalization, ADR-053 Mode #4 minta): az agentek célismerete NEM
# a beszélgetés-kontextusban él (az elhalványul — goal drift), hanem ebben a tartós,
# verziózott configban. A koordinátor briefingje és a wake goal-fókusz innen olvas.
# Séma: conductor/epicManager.ts (id, name, status, depends_on, checkpoints).
# A checkpoint = SAROKKŐ: mérhető feltétellel (condition), és azzal, kit értesít
# a teljesülése (trigger_to) — dense milestone feedback.
#
# VÁZLAT — Gábor reviewjára vár: a sarokkövek a session-történetből rekonstruáltak,
# a hiányzó/rossz tételeket javítani kell, nem kőbe vésettek.

